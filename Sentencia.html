        }

        .card {

            border-radius: 20px;
            padding: 25px;
            transition: 0.4s;
            text-decoration: none;
            color: white;
            display: block;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(56, 189, 248, 0.2);
        }

        .card h2 {
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .card p {
            color: #e2e8f0;
        }
