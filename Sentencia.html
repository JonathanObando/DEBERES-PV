<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programacion Estructurada</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .contenedor {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }

        h1.titulo-principal {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #38bdf8;
        }

        .objetivo {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #cbd5e1;
        }

        .ejercicio {
            margin-bottom: 40px;
        }

        .ejercicio h2 {
            font-size: 1.8rem;
            color: #38bdf8;
            margin-bottom: 15px;
        }

        video {
            width: 100%;
            max-width: 640px;
            height: auto;
            border-radius: 12px;
            background: #000;
        }
    </style>
</head>

<body>

    <div class="contenedor">
